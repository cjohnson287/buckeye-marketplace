name: Deploy Backend API

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "backend.Tests/**"
      - "buckeye-marketplace.sln"
      - ".github/workflows/deploy-backend.yml"

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore buckeye-marketplace.sln

      - name: Build
        run: dotnet build buckeye-marketplace.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend.Tests/backend.Tests.csproj --configuration Release --no-build

      - name: Publish backend
        run: dotnet publish backend/backend.csproj --configuration Release --output ./backend-publish

      - name: Deploy backend to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: buckeye-api-final-ryon287
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: ./backend-publish
